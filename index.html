<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>UTP - Acceso al Sistema</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Fuentes e íconos -->
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="css/styles.css" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            outline: "#8f6f71",
            "on-primary-fixed-variant": "#91002d",
            "on-tertiary-fixed": "#0b1c30",
            "on-tertiary-fixed-variant": "#38485d",
            "inverse-primary": "#ffb2b8",
            "on-secondary-container": "#616363",
            "surface-bright": "#fcf8f9",
            "primary-container": "#d01a49",
            "outline-variant": "#e3bdbf",
            error: "#ba1a1a",
            "on-error": "#ffffff",
            "surface-container-high": "#eae7e8",
            "on-secondary": "#ffffff",
            "primary-fixed-dim": "#ffb2b8",
            "inverse-on-surface": "#f3f0f1",
            "on-tertiary": "#ffffff",
            primary: "#a80035",
            "on-tertiary-container": "#e3edff",
            "secondary-container": "#dfe0e0",
            "tertiary-container": "#5c6c83",
            "on-primary": "#ffffff",
            "on-secondary-fixed-variant": "#454747",
            tertiary: "#44546a",
            "on-secondary-fixed": "#1a1c1c",
            "on-background": "#1b1b1c",
            "on-surface": "#1b1b1c",
            "on-error-container": "#93000a",
            secondary: "#5d5f5f",
            background: "#fcf8f9",
            "secondary-fixed-dim": "#c6c6c7",
            "surface-variant": "#e5e2e3",
            "tertiary-fixed": "#d3e4fe",
            "on-surface-variant": "#5b4042",
            "error-container": "#ffdad6",
            surface: "#fcf8f9",
            "secondary-fixed": "#e2e2e2",
            "tertiary-fixed-dim": "#b7c8e1",
            "surface-container-low": "#f6f3f4",
            "inverse-surface": "#303031",
            "primary-fixed": "#ffdadb",
            "surface-container-highest": "#e5e2e3",
            "surface-tint": "#be003e",
            "on-primary-container": "#ffe7e8",
            "on-primary-fixed": "#40000f",
            "surface-container": "#f0edee",
            "surface-dim": "#dcd9da",
            "surface-container-lowest": "#ffffff",
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem",
          },
          spacing: {
            xl: "80px",
            "container-max": "1280px",
            lg: "48px",
            md: "24px",
            sm: "12px",
            xs: "4px",
            base: "8px",
            gutter: "24px",
          },
          fontFamily: {
            sans: ["Public Sans", "sans-serif"],
          },
          fontSize: {
            h1: ["48px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "700" }],
            caption: ["12px", { lineHeight: "1.4", fontWeight: "400" }],
            h3: ["24px", { lineHeight: "1.3", fontWeight: "600" }],
            h2: ["36px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "700" }],
            "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
            "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
            "label-md": ["14px", { lineHeight: "1.2", fontWeight: "600" }],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
  <main class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-md" id="app">
      <!-- Brand Identity -->
      <header class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-lg mb-6 shadow-lg shadow-primary/20">
          <span class="material-symbols-outlined text-white text-4xl">school</span>
        </div>
        <h1 class="text-h2 text-primary mb-2">UTP</h1>
        <p class="text-body-md text-secondary">Sistema Académico</p>
      </header>

      <!-- Contenedor de vistas -->
      <div id="viewContainer" class="fade-in">
        <!-- ========== VISTA LOGIN ========== -->
        <div id="loginView" class="bg-white rounded-xl shadow-xl border border-surface-container overflow-hidden">
          <div class="p-8">
            <h3 class="text-label-md text-on-surface-variant uppercase tracking-wider mb-6 text-center">Ingreso de Credenciales</h3>
            <form id="loginForm" class="space-y-6">
              <div>
                <label class="block text-label-md font-semibold text-on-surface mb-2" for="loginCodigo">CÓDIGO DE ESTUDIANTE</label>
                <input
                  class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline/60"
                  id="loginCodigo"
                  placeholder="Ej: U20XX-XXXXX"
                  type="text"
                  required
                />
              </div>
              <div>
                <label class="block text-label-md font-semibold text-on-surface mb-2" for="loginClave">CLAVE DE ACCESO</label>
                <input
                  class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline/60"
                  id="loginClave"
                  placeholder="********"
                  type="password"
                  required
                />
              </div>
              <div id="loginMessage" class="text-sm font-medium text-center min-h-[1.5rem]"></div>
              <button
                type="submit"
                class="w-full py-4 bg-primary-container hover:bg-primary text-white font-bold rounded-lg shadow-lg hover:shadow-xl transition-all transform active:scale-[0.98]"
              >
                INICIAR SESIÓN
              </button>
            </form>

            <div class="mt-4 text-center">
              <button id="showRegisterBtn" class="text-label-md text-primary hover:underline font-medium cursor-pointer">
                ¿No tienes cuenta? Regístrate
              </button>
            </div>

            <div class="relative my-6">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-outline-variant"></div>
              </div>
              <div class="relative flex justify-center text-label-md">
                <span class="bg-white px-4 text-on-surface-variant">O accede con</span>
              </div>
            </div>

            <div class="space-y-3">
              <button class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-all group">
                <img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuANTRYysxp9VjUP3LK7M3T-UFdUAazUNlwDqk_yDJ7lBkLQ8zpLpFRTVXRfA77rGxKmcwAMo82LoXf37TrSdNVbj4aOg6BCW3jc95QH4jmdEkwiAwkD3YeKcos-WLxvLdlGIxke7n3KWraOCy6lSgtHo5p1M0Pd9B_m9IEHFLw9hE_RvArye2tJ_C8CBf-MkkHkbZAYqzSxNkKRK0DdDmG_VKqZfcCDZUGq_9xjSHhkMdxWwTx6Pm2PwDdv13D4ogwVfPqT_diLNdo" />
                <span class="text-label-md font-semibold text-on-surface">Continuar con Google</span>
              </button>
              <button class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-outline-variant rounded-lg hover:bg-surface-container-low transition-all group">
                <span class="material-symbols-outlined text-on-surface">terminal</span>
                <span class="text-label-md font-semibold text-on-surface">Continuar con GitHub</span>
              </button>
            </div>
          </div>
        </div>

        <!-- ========== VISTA REGISTRO ========== -->
        <div id="registerView" class="bg-white rounded-xl shadow-xl border border-surface-container overflow-hidden hidden">
          <div class="p-8">
            <h3 class="text-label-md text-on-surface-variant uppercase tracking-wider mb-6 text-center">Crear Cuenta</h3>
            <form id="registerForm" class="space-y-6">
              <div>
                <label class="block text-label-md font-semibold text-on-surface mb-2" for="registerCodigo">CÓDIGO DE ESTUDIANTE</label>
                <input
                  class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline/60"
                  id="registerCodigo"
                  placeholder="Ej: U20XX-XXXXX"
                  type="text"
                  required
                />
              </div>
              <div>
                <label class="block text-label-md font-semibold text-on-surface mb-2" for="registerClave">CLAVE DE ACCESO</label>
                <input
                  class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline/60"
                  id="registerClave"
                  placeholder="Mínimo 6 caracteres"
                  type="password"
                  required
                  minlength="6"
                />
              </div>
              <div>
                <label class="block text-label-md font-semibold text-on-surface mb-2" for="registerConfirmar">CONFIRMAR CLAVE</label>
                <input
                  class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline/60"
                  id="registerConfirmar"
                  placeholder="Repite tu clave"
                  type="password"
                  required
                />
              </div>
              <div id="registerMessage" class="text-sm font-medium text-center min-h-[1.5rem]"></div>
              <button
                type="submit"
                class="w-full py-4 bg-primary-container hover:bg-primary text-white font-bold rounded-lg shadow-lg hover:shadow-xl transition-all transform active:scale-[0.98]"
              >
                REGISTRARSE
              </button>
            </form>
            <div class="mt-4 text-center">
              <button id="showLoginBtn" class="text-label-md text-primary hover:underline font-medium cursor-pointer">
                ¿Ya tienes cuenta? Inicia sesión
              </button>
            </div>
          </div>
        </div>

        <!-- ========== VISTA BIENVENIDA ========== -->
        <div id="welcomeView" class="bg-white rounded-xl shadow-xl border border-surface-container overflow-hidden hidden">
          <div class="p-8 text-center">
            <span class="material-symbols-outlined text-6xl text-primary mb-4">verified</span>
            <h2 class="text-h3 text-primary mb-2">¡Bienvenido!</h2>
            <p id="welcomeUser" class="text-body-md text-secondary mb-6">Usuario</p>
            <button
              id="logoutBtn"
              class="w-full py-3 bg-error hover:bg-error/80 text-white font-bold rounded-lg shadow-lg hover:shadow-xl transition-all transform active:scale-[0.98]"
            >
              CERRAR SESIÓN
            </button>
          </div>
        </div>
      </div>

      <!-- Mensaje de ayuda -->
      <div class="mt-8 text-center space-y-4">
        <p class="text-caption text-secondary">
          ¿Necesitas ayuda? <a class="text-primary hover:underline font-semibold" href="#">Contacta a Soporte IT</a>
        </p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-surface-container py-8 px-6">
    <div class="max-w-md mx-auto text-center">
      <p class="text-label-md font-bold text-primary mb-1">© 2024 UNIVERSIDAD TECNOLÓGICA DEL PERÚ</p>
      <p class="text-caption text-on-surface-variant">Todos los derechos reservados. Sistema de Gestión Universitaria.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      UI.init();
    });
  </script>
</body>
</html>
