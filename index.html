<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>UTP - Acceso al Sistema</title>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Fuentes e íconos -->
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <!-- Estilos personalizados (opcional) -->
  <link rel="stylesheet" href="css/styles.css" />
  <script id="tailwind-config">
    tailwind.config = {
      // ... (misma configuración que antes) ...
    };
  </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
  <main class="flex-grow flex items-center justify-center p-6">
    <div class="w-full max-w-md" id="app">
      <!-- Brand Identity (igual) -->
      <header class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-lg mb-6 shadow-lg shadow-primary/20">
          <span class="material-symbols-outlined text-white text-4xl">school</span>
        </div>
        <h1 class="text-h2 text-primary mb-2">UTP</h1>
        <p class="text-body-md text-secondary">Sistema Académico</p>
      </header>

      <!-- Contenedor de vistas (login / registro / bienvenida) -->
      <div id="viewContainer" class="fade-in">
        <!-- Vista de Login -->
        <div id="loginView" class="bg-white rounded-xl shadow-xl border border-surface-container overflow-hidden">
          <!-- ... mismo contenido ... -->
        </div>
        <!-- Vista de Registro -->
        <div id="registerView" class="bg-white rounded-xl shadow-xl border border-surface-container overflow-hidden hidden">
          <!-- ... mismo contenido ... -->
        </div>
        <!-- Vista de Bienvenida -->
        <div id="welcomeView" class="bg-white rounded-xl shadow-xl border border-surface-container overflow-hidden hidden">
          <!-- ... mismo contenido ... -->
        </div>
      </div>

      <!-- Footer informativo (igual) -->
      <div class="mt-8 text-center space-y-4">
        <p class="text-caption text-secondary">
          ¿Necesitas ayuda? <a class="text-primary hover:underline font-semibold" href="#">Contacta a Soporte IT</a>
        </p>
      </div>
    </div>
  </main>

  <footer class="bg-white border-t border-surface-container py-8 px-6">
    <div class="max-w-md mx-auto text-center">
      <p class="text-label-md font-bold text-primary mb-1">© 2024 UNIVERSIDAD TECNOLÓGICA DEL PERÚ</p>
      <p class="text-caption text-on-surface-variant">Todos los derechos reservados. Sistema de Gestión Universitaria.</p>
    </div>
  </footer>

  <!-- Cargar scripts externos -->
  <script src="js/auth.js"></script>
  <script src="js/ui.js"></script>
  <!-- Inicialización (puede ir en ui.js o aquí) -->
  <script>
    // Al cargar, inicializa la UI
    document.addEventListener('DOMContentLoaded', () => {
      UI.init();
    });
  </script>
</body>
</html>
